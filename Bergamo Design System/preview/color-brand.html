<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--paper); display: flex; align-items: center; min-height: 100vh; }
  .row { display: flex; gap: 16px; flex-wrap: wrap; }
  .sw { display: flex; flex-direction: column; }
  .chip { width: 132px; height: 88px; border: 1px solid var(--border-strong); }
  .meta { padding-top: 8px; }
  .name { font-family: var(--font-mono); font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink); }
  .val { font-family: var(--font-mono); font-size: 11px; color: var(--steel); margin-top: 2px; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#E55A18"></div><div class="meta"><div class="name">Container</div><div class="val">#E55A18</div></div></div>
    <div class="sw"><div class="chip" style="background:#B7390A"></div><div class="meta"><div class="name">Container Deep</div><div class="val">#B7390A</div></div></div>
    <div class="sw"><div class="chip" style="background:#F4ECDD"></div><div class="meta"><div class="name">Paper</div><div class="val">#F4ECDD</div></div></div>
    <div class="sw"><div class="chip" style="background:#101826"></div><div class="meta"><div class="name">Night</div><div class="val">#101826</div></div></div>
    <div class="sw"><div class="chip" style="background:#0B0E12"></div><div class="meta"><div class="name">Ink</div><div class="val">#0B0E12</div></div></div>
    <div class="sw"><div class="chip" style="background:#3F5A2A"></div><div class="meta"><div class="name">Hopfen</div><div class="val">#3F5A2A</div></div></div>
  </div>
</body></html>
