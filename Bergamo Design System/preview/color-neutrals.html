<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--paper); display: flex; align-items: center; min-height: 100vh; }
  .row { display: flex; gap: 16px; flex-wrap: wrap; }
  .sw { display: flex; flex-direction: column; }
  .chip { width: 132px; height: 88px; border: 1px solid var(--border-faint); }
  .meta { padding-top: 8px; }
  .name { font-family: var(--font-mono); font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink); }
  .val { font-family: var(--font-mono); font-size: 11px; color: var(--steel); margin-top: 2px; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#F4ECDD"></div><div class="meta"><div class="name">Paper</div><div class="val">#F4ECDD</div></div></div>
    <div class="sw"><div class="chip" style="background:#EADFCA"></div><div class="meta"><div class="name">Paper-2</div><div class="val">#EADFCA</div></div></div>
    <div class="sw"><div class="chip" style="background:#DFD2B8"></div><div class="meta"><div class="name">Paper-3</div><div class="val">#DFD2B8</div></div></div>
    <div class="sw"><div class="chip" style="background:#CFC8B8"></div><div class="meta"><div class="name">Steel-3</div><div class="val">#CFC8B8</div></div></div>
    <div class="sw"><div class="chip" style="background:#A8A294"></div><div class="meta"><div class="name">Steel-2</div><div class="val">#A8A294</div></div></div>
    <div class="sw"><div class="chip" style="background:#6E6A63"></div><div class="meta"><div class="name">Steel</div><div class="val">#6E6A63</div></div></div>
    <div class="sw"><div class="chip" style="background:#1A1F27"></div><div class="meta"><div class="name">Ink-2</div><div class="val">#1A1F27</div></div></div>
    <div class="sw"><div class="chip" style="background:#0B0E12"></div><div class="meta"><div class="name">Ink</div><div class="val">#0B0E12</div></div></div>
  </div>
</body></html>
