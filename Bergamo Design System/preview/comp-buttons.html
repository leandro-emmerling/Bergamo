<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--paper); min-height: 100vh; display: flex; align-items: center; flex-wrap: wrap; gap: 20px; }
  .btn { font-family: var(--font-display); font-weight: 900; text-transform: uppercase; letter-spacing: 0.02em; font-size: 18px; padding: 14px 22px; border: 1px solid var(--ink); cursor: pointer; transition: all 180ms cubic-bezier(.2,.7,.2,1); }
  .primary { background: var(--container); color: var(--paper); box-shadow: 6px 6px 0 var(--ink); }
  .secondary { background: var(--paper); color: var(--ink); box-shadow: 6px 6px 0 var(--ink); }
  .ghost { background: transparent; color: var(--ink); border: 1px solid var(--ink); }
  .ghost:hover { background: var(--ink); color: var(--paper); }
  .pill { background: var(--ink); color: var(--paper); border-radius: 999px; border: none; padding: 10px 18px; font-size: 13px; font-family: var(--font-mono); font-weight: 700; letter-spacing: 0.12em; }
  .arrow { font-family: var(--font-mono); }
</style></head>
<body>
  <button class="btn primary">Anfahrt <span class="arrow">→</span></button>
  <button class="btn secondary">Folgen</button>
  <button class="btn ghost">Teilen</button>
  <button class="pill">INSTAGRAM</button>
</body></html>
