<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--paper); min-height: 100vh; display: flex; align-items: center; gap: 22px; flex-wrap: wrap; }
  .chip { display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px; font-family: var(--font-mono); font-weight: 700; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; }
  .chip.solid { background: var(--ink); color: var(--paper); }
  .chip.accent { background: var(--container); color: var(--paper); }
  .chip.outline { border: 1px solid var(--ink); color: var(--ink); }
  .chip.hop { background: var(--hopfen); color: var(--paper); }
  .dot { width: 6px; height: 6px; background: currentColor; border-radius: 50%; }
  .eb { font-family: var(--font-mono); font-weight: 500; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--steel); width: 100%; margin-bottom: -10px; }
</style></head>
<body>
  <div class="eb">Tags · Eyebrows · Status chips</div>
  <span class="chip accent"><span class="dot"></span>Live · 21:00</span>
  <span class="chip solid">Open Air</span>
  <span class="chip hop">All Mixed Up</span>
  <span class="chip outline">Classic Rock</span>
  <span class="chip outline">'80er &amp; '90er</span>
  <span class="chip outline">Schwanfeld · Bayern</span>
</body></html>
