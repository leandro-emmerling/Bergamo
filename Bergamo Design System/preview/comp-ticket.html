<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--paper); min-height: 100vh; display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
  .row { display: flex; gap: 16px; flex-wrap: wrap; align-items: stretch; }
  .ticket { display: flex; border: 1px solid var(--ink); background: var(--paper-2); min-width: 280px; box-shadow: 3px 3px 0 var(--ink); }
  .ticket .stub { padding: 14px 16px; border-right: 1px dashed var(--ink); display: flex; flex-direction: column; justify-content: center; align-items: center; min-width: 78px; background: var(--container); color: var(--paper); }
  .ticket .stub .day { font-family: var(--font-mono); font-weight: 700; font-size: 10px; letter-spacing: 0.16em; }
  .ticket .stub .num { font-family: var(--font-display); font-weight: 900; font-size: 38px; line-height: 1; letter-spacing: -1px; margin-top: 2px; }
  .ticket .body { padding: 12px 16px; display: flex; flex-direction: column; justify-content: center; gap: 4px; }
  .ticket h4 { font-family: var(--font-display); font-weight: 900; font-size: 18px; text-transform: uppercase; margin: 0; letter-spacing: -0.01em; }
  .ticket .meta { font-family: var(--font-mono); font-weight: 500; font-size: 11px; color: var(--steel); letter-spacing: 0.08em; }
  .ticket.alt .stub { background: var(--hopfen); }
</style></head>
<body>
  <div class="row">
    <div class="ticket">
      <div class="stub"><span class="day">FREITAG</span><span class="num">31</span><span class="day">07/2026</span></div>
      <div class="body"><h4>Classic Rock</h4><span class="meta">'80er &amp; '90er</span><span class="meta">Einlass 20:30 · ab 21:00</span></div>
    </div>
    <div class="ticket alt">
      <div class="stub"><span class="day">SAMSTAG</span><span class="num">01</span><span class="day">08/2026</span></div>
      <div class="body"><h4>All Mixed Up</h4><span class="meta">Querbeet · 21:00 Uhr</span><span class="meta">Bargeld &amp; EC</span></div>
    </div>
  </div>
</body></html>
