<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--paper); min-height: 100vh; display: flex; align-items: center; }
  .row { display: flex; gap: 22px; flex-wrap: wrap; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .block { background: var(--container); }
  .label { font-family: var(--font-mono); font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink); }
  .val { font-family: var(--font-mono); font-size: 10px; color: var(--steel); }
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="block" style="width:4px;height:36px"></div><div class="label">s-1</div><div class="val">4</div></div>
    <div class="item"><div class="block" style="width:8px;height:36px"></div><div class="label">s-2</div><div class="val">8</div></div>
    <div class="item"><div class="block" style="width:12px;height:36px"></div><div class="label">s-3</div><div class="val">12</div></div>
    <div class="item"><div class="block" style="width:16px;height:36px"></div><div class="label">s-4</div><div class="val">16</div></div>
    <div class="item"><div class="block" style="width:24px;height:36px"></div><div class="label">s-5</div><div class="val">24</div></div>
    <div class="item"><div class="block" style="width:32px;height:36px"></div><div class="label">s-6</div><div class="val">32</div></div>
    <div class="item"><div class="block" style="width:48px;height:36px"></div><div class="label">s-7</div><div class="val">48</div></div>
    <div class="item"><div class="block" style="width:64px;height:36px"></div><div class="label">s-8</div><div class="val">64</div></div>
    <div class="item"><div class="block" style="width:96px;height:36px"></div><div class="label">s-9</div><div class="val">96</div></div>
    <div class="item"><div class="block" style="width:128px;height:36px"></div><div class="label">s-10</div><div class="val">128</div></div>
  </div>
</body></html>
