<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 0; background: var(--paper); min-height: 100vh; display: flex; align-items: center; }
  .wrap { width: 100%; padding: 24px 32px; }
  .strip { height: 64px; background-image: url('../assets/corrugated.svg'); background-repeat: repeat; color: var(--ink); border-top: 1px solid var(--ink); border-bottom: 1px solid var(--ink); display: flex; align-items: center; padding: 0 24px; }
  .strip .label { font-family: var(--font-mono); font-weight: 700; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink); background: var(--paper); padding: 4px 10px; border: 1px solid var(--ink); }
  .strip.night { background-color: var(--night); color: var(--paper); }
  .strip.night .label { background: var(--container); color: var(--paper); border-color: var(--container); }
  .lbl { font-family: var(--font-mono); font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--steel); padding: 8px 0; }
</style></head>
<body>
  <div class="wrap">
    <div class="lbl">Corrugated divider · on paper</div>
    <div class="strip"><span class="label">CONTAINER E.V.</span></div>
    <div class="lbl" style="margin-top: 18px">Corrugated divider · on night</div>
    <div class="strip night"><span class="label">CONTAINER E.V.</span></div>
  </div>
</body></html>
