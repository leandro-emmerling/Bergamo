<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 0; background: var(--paper); display: flex; min-height: 100vh; }
  .half { flex: 1; padding: 32px; display: flex; flex-direction: column; justify-content: space-between; min-height: 220px; }
  .half.night { background: var(--night); color: var(--paper); }
  .eb { font-family: var(--font-mono); font-size: 11px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; }
  .display { font-family: var(--font-display); font-weight: 900; font-size: 56px; line-height: 0.9; text-transform: uppercase; letter-spacing: -0.02em; margin: 8px 0 0; }
  .meta { font-family: var(--font-mono); font-size: 11px; }
  .accent { color: #E55A18; }
</style></head>
<body>
  <div class="half" style="color:#0B0E12">
    <div>
      <div class="eb" style="color:#6E6A63">on paper</div>
      <h2 class="display">Open-Air<br/><span class="accent">vom Container</span></h2>
    </div>
    <div class="meta" style="color:#6E6A63">fg-1 ink · fg-2 steel · accent container</div>
  </div>
  <div class="half night">
    <div>
      <div class="eb" style="color:#A8A294">on night</div>
      <h2 class="display">Open-Air<br/><span class="accent">vom Container</span></h2>
    </div>
    <div class="meta" style="color:#A8A294">fg-1 paper · fg-2 steel-2 · accent container</div>
  </div>
</body></html>
