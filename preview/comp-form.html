<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 32px; background: var(--paper); min-height: 100vh; display: flex; align-items: center; }
  .stack { width: 100%; max-width: 460px; display: flex; flex-direction: column; gap: 14px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .lbl { font-family: var(--font-mono); font-weight: 700; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink); }
  input, select { font-family: var(--font-body); font-size: 16px; padding: 12px 14px; border: 1px solid var(--ink); background: var(--paper); color: var(--ink); border-radius: 0; outline: none; }
  input:focus { outline: 2px solid var(--container); outline-offset: 2px; }
  .helper { font-family: var(--font-body); font-size: 12px; color: var(--steel); }
  .row { display: flex; gap: 10px; }
  .row .field { flex: 1; }
  .check { display: flex; gap: 10px; align-items: center; }
  .box { width: 18px; height: 18px; border: 1px solid var(--ink); display: inline-block; }
  .box.checked { background: var(--container); border-color: var(--container); position: relative; }
  .box.checked::after { content: ""; position: absolute; left: 4px; top: 1px; width: 5px; height: 10px; border: solid var(--paper); border-width: 0 2px 2px 0; transform: rotate(45deg); }
</style></head>
<body>
  <div class="stack">
    <div class="row">
      <div class="field"><label class="lbl">Name</label><input value="Anna Bauer" /></div>
      <div class="field"><label class="lbl">E-Mail</label><input value="anna@example.de" /></div>
    </div>
    <div class="field"><label class="lbl">Nachricht</label><input value="Komme mit drei Freunden vorbei." /></div>
    <div class="check"><span class="box checked"></span><span class="helper">Ich abonniere den Newsletter für nächstes Jahr.</span></div>
  </div>
</body></html>
