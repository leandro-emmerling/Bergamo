<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 0; background: var(--paper); min-height: 100vh; }
  .bar { display: flex; align-items: center; justify-content: space-between; padding: 18px 32px; border-bottom: 1px solid var(--ink); background: rgba(244,236,221,0.85); backdrop-filter: blur(10px) saturate(140%); }
  .wm { font-family: var(--font-display); font-weight: 900; font-size: 28px; letter-spacing: -0.02em; color: var(--ink); }
  .nav { display: flex; gap: 22px; }
  .nav a { font-family: var(--font-mono); font-weight: 700; font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink); text-decoration: none; }
  .cta { font-family: var(--font-mono); font-weight: 700; font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--paper); background: var(--ink); padding: 10px 14px; }
  .panel { padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; }
  .h2 { font-family: var(--font-display); font-weight: 900; font-size: 42px; line-height: 1; text-transform: uppercase; letter-spacing: -0.01em; }
  .meta { font-family: var(--font-mono); font-size: 12px; color: var(--steel); letter-spacing: 0.08em; }
</style></head>
<body>
  <div class="bar">
    <span class="wm">BERGAMO</span>
    <div class="nav"><a>Lineup</a><a>Anfahrt</a><a>Info</a><a>Instagram</a></div>
    <span class="cta">31.07 — 01.08</span>
  </div>
  <div class="panel">
    <div class="h2">Open-Air<br/><span style="color:var(--container)">vom Container.</span></div>
    <div class="meta">49.909626, 10.144008</div>
  </div>
</body></html>
