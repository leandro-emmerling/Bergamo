<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--paper); min-height: 100vh; display: flex; align-items: center; gap: 24px; }
  .card { border: 1px solid var(--ink); padding: 20px 22px; background: var(--paper-2); width: 280px; box-shadow: 6px 6px 0 var(--ink); }
  .card.night { background: var(--night); color: var(--paper); box-shadow: 6px 6px 0 var(--container); border-color: var(--paper); }
  .eb { font-family: var(--font-mono); font-weight: 700; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--steel); }
  .card.night .eb { color: var(--steel-2); }
  .num { font-family: var(--font-display); font-weight: 900; font-size: 96px; line-height: 0.85; color: var(--container); letter-spacing: -0.04em; margin-top: 4px; }
  .day { font-family: var(--font-display); font-weight: 900; font-size: 24px; line-height: 1; text-transform: uppercase; margin-top: 6px; }
  .meta { font-family: var(--font-mono); font-weight: 500; font-size: 12px; letter-spacing: 0.08em; margin-top: 6px; color: inherit; }
</style></head>
<body>
  <div class="card">
    <div class="eb">FREITAG · 31.07.2026</div>
    <div class="num">31</div>
    <div class="day">Classic Rock</div>
    <div class="meta">'80er &amp; '90er · ab 21:00 Uhr</div>
  </div>
  <div class="card night">
    <div class="eb">SAMSTAG · 01.08.2026</div>
    <div class="num">01</div>
    <div class="day">All Mixed Up</div>
    <div class="meta">ab 21:00 Uhr</div>
  </div>
</body></html>
