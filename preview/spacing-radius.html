<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--paper); min-height: 100vh; display: flex; align-items: center; }
  .row { display: flex; gap: 36px; align-items: flex-end; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 86px; height: 86px; background: var(--paper-2); border: 1px solid var(--ink); }
  .label { font-family: var(--font-mono); font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink); }
  .val { font-family: var(--font-mono); font-size: 10px; color: var(--steel); }
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box"></div><div class="label">r-0</div><div class="val">0px · flat-cut (default)</div></div>
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="label">r-sm</div><div class="val">4px</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="label">r-md</div><div class="val">8px · photos only</div></div>
    <div class="item"><div class="box" style="border-radius:999px;width:140px;height:48px"></div><div class="label">r-full</div><div class="val">pill controls</div></div>
  </div>
</body></html>
