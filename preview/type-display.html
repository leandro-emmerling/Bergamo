<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 32px; background: var(--paper); min-height: 100vh; display: flex; align-items: center; }
  .wrap { width: 100%; }
  .row { display: grid; grid-template-columns: 90px 1fr 80px; gap: 18px; align-items: baseline; padding: 6px 0; }
  .label { font-family: var(--font-mono); font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--steel); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--steel); text-align: right; }
  .d-poster { font-family: var(--font-display); font-weight: normal; font-size: 88px; line-height: 0.85; text-transform: uppercase; letter-spacing: -0.01em; color: var(--ink); }
  .d-h1 { font-family: var(--font-display); font-weight: normal; font-size: 56px; line-height: 1; text-transform: uppercase; letter-spacing: -0.005em; color: var(--ink); }
  .d-h3 { font-family: var(--font-display); font-weight: normal; font-size: 32px; line-height: 1.05; text-transform: uppercase; color: var(--ink); }
</style></head>
<body>
  <div class="wrap">
    <div class="row"><div class="label">Poster</div><div class="d-poster">BERGAMO</div><div class="meta">Steelfish</div></div>
    <div class="row"><div class="label">H1</div><div class="d-h1">Zwei Nächte</div><div class="meta">56px</div></div>
    <div class="row"><div class="label">H3</div><div class="d-h3">Classic Rock '80er &amp; '90er</div><div class="meta">32px</div></div>
  </div>
</body></html>
