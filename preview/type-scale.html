<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--paper); min-height: 100vh; display: flex; align-items: center; }
  .wrap { width: 100%; }
  .row { display: grid; grid-template-columns: 110px 1fr 70px; align-items: baseline; gap: 12px; padding: 7px 0; }
  .label { font-family: var(--font-mono); font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--steel); }
  .val { font-family: var(--font-mono); font-size: 11px; color: var(--steel); text-align: right; }
  .demo { font-family: var(--font-display); font-weight: normal; text-transform: uppercase; color: var(--ink); line-height: 1; letter-spacing: -0.005em; }
</style></head>
<body>
  <div class="wrap">
    <div class="row"><div class="label">text-poster</div><div class="demo" style="font-size:88px">Bergamo</div><div class="val">160px</div></div>
    <div class="row"><div class="label">text-4xl</div><div class="demo" style="font-size:64px">Bergamo</div><div class="val">160px</div></div>
    <div class="row"><div class="label">text-3xl</div><div class="demo" style="font-size:44px">Bergamo</div><div class="val">88px</div></div>
    <div class="row"><div class="label">text-2xl</div><div class="demo" style="font-size:32px">Bergamo</div><div class="val">52px</div></div>
    <div class="row"><div class="label">text-xl</div><div class="demo" style="font-size:24px">Bergamo</div><div class="val">34px</div></div>
    <div class="row"><div class="label">text-base</div><div style="font-family:var(--font-body);font-size:16px">Bergamo — Open-Air · Container e.V.</div><div class="val">16px</div></div>
  </div>
</body></html>
